<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexiFunds Perfumes</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#0a0a0a; color:#fff; }
    header { padding:20px; text-align:center; background:#000; border-bottom:1px solid gold; }
    header h1 { color:gold; margin:0; }
    .hero { text-align:center; padding:60px 20px; }
    .hero h2 { font-size:32px; margin-bottom:10px; }
    .products { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:40px; }
    .card { background:#111; border:1px solid gold; border-radius:16px; padding:20px; text-align:center; }
    .card h3 { color:gold; }
    .price { font-size:20px; margin:10px 0; }
    button { background:gold; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; }
    .whatsapp { display:block; margin:20px auto; text-align:center; }
    footer { text-align:center; padding:20px; border-top:1px solid gold; }
  </style>
</head>
<body>

<header>
  <h1>FlexiFunds Perfumes</h1>
  <p>Luxury Fragrance Collection</p>
</header>

<section class="hero">
  <h2>Smell Expensive. Pay Smart.</h2>
  <p>Premium scents at affordable prices.</p>
</section>

<section class="products">
  <div class="card">
    <h3>Classic Oud</h3>
    <p class="price">K125</p>
    <button onclick="orderWhatsApp('Classic Oud')">Order</button>
  </div>

  <div class="card">
    <h3>Midnight Gold</h3>
    <p class="price">K125</p>
    <button onclick="orderWhatsApp('Midnight Gold')">Order</button>
  </div>

  <div class="card">
    <h3>Fresh Breeze</h3>
    <p class="price">K125</p>
    <button onclick="orderWhatsApp('Fresh Breeze')">Order</button>
  </div>
</section>

<div class="whatsapp">
  <button onclick="contactWhatsApp()">Chat on WhatsApp</button>
</div>

<footer>
  <p>CEO: Andrew Kakoma</p>
  <p>FlexiFunds © 2026</p>
</footer>

<script>
function orderWhatsApp(product) {
  const number = "260 979194796";
  const message = "Hello, I want to order " + product;
  window.open("https://wa.me/" + number + "?text=" + encodeURIComponent(message), "_blank");
}

function contactWhatsApp() {
  const number = "26097XXXXXXX";
  window.open("https://wa.me/" + number, "_blank");
}
</script>

</body>
</html>
